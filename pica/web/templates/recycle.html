{% extends "base.html" %}
{% block title %}回收站{% endblock %}
{% block content %}
<div x-data="recycleApp()" x-init="init()" class="min-h-screen" style="background:#f5f5f7;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <!-- Header -->
  <div class="sticky top-0 z-30 bg-white/80 backdrop-blur-2xl border-b border-white/30 px-6 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-full bg-red-50 flex items-center justify-center text-red-500 shadow-sm">
        <i class="fa-regular fa-trash-can" style="font-size:13px"></i>
      </div>
      <h1 class="text-base font-semibold text-gray-800">回收站</h1>
      <span class="text-[11px] text-gray-400" x-text="images.length + ' 张'"></span>
    </div>
    <div class="flex items-center gap-2">
      <button @click="emptyAll" class="h-8 px-4 rounded-full text-xs font-medium flex items-center gap-1.5"
              style="background:rgba(255,59,48,0.12);color:#b82e24;border:none;cursor:pointer;transition:all 0.2s"
              @mouseenter="$el.style.background='rgba(255,59,48,0.25)'"
              @mouseleave="$el.style.background='rgba(255,59,48,0.12)'">
        <i class="fa-regular fa-trash-can"></i>清空回收站
      </button>
    </div>
  </div>

  <div class="p-6">
    <template x-if="!images.length">
      <div class="flex flex-col items-center justify-center py-24 text-gray-400">
        <i class="fa-regular fa-trash-can text-5xl mb-4 opacity-20"></i>
        <p class="text-sm font-medium text-gray-500">回收站是空的</p>
        <p class="text-[11px] mt-1 text-gray-300">从其他页面删除的图片会出现在这里</p>
      </div>
    </template>

    <template x-if="images.length">
      <div>
        <!-- Selection bar -->
        <div x-show="selected.length" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-40 flex items-center gap-3 px-5 py-3 rounded-2xl shadow-lg"
             style="background:rgba(255,255,255,0.92);backdrop-filter:blur(30px);border:1px solid rgba(0,0,0,0.06);">
          <span class="text-xs font-semibold text-gray-600 whitespace-nowrap">已选 <span x-text="selected.length"></span> 项</span>
          <div class="w-px h-5 bg-gray-200"></div>
          <button @click="batchRestore" class="h-8 px-4 rounded-xl text-xs font-medium flex items-center gap-1.5"
                  style="background:rgba(52,199,89,0.12);color:#1a6a32;border:none;cursor:pointer;transition:all 0.2s"
                  @mouseenter="$el.style.background='rgba(52,199,89,0.25)'"
                  @mouseleave="$el.style.background='rgba(52,199,89,0.12)'">
            <i class="fa-regular fa-rotate-left"></i>恢复
          </button>
          <button @click="batchDelete" class="h-8 px-4 rounded-xl text-xs font-medium flex items-center gap-1.5"
                  style="background:rgba(255,59,48,0.12);color:#b82e24;border:none;cursor:pointer;transition:all 0.2s"
                  @mouseenter="$el.style.background='rgba(255,59,48,0.25)'"
                  @mouseleave="$el.style.background='rgba(255,59,48,0.12)'">
            <i class="fa-regular fa-xmark"></i>永久删除
          </button>
          <div class="w-px h-5 bg-gray-200"></div>
          <button @click="selected = []" class="text-xs text-gray-400 hover:text-gray-600 bg-transparent border-none cursor-pointer">取消选择</button>
        </div>

        <!-- Image grid -->
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px">
          <template x-for="img in images" :key="img.id">
            <div class="relative rounded-2xl overflow-hidden transition-all duration-200 cursor-pointer"
                 :class="selected.includes(img.id) ? 'ring-2 ring-blue-400 shadow-md' : 'hover:shadow-sm'"
                 style="background:rgba(255,255,255,0.8);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.4);"
                 @click="toggleSelect(img.id)"
                 data-img-id="">
              <div style="aspect-ratio:16/10;overflow:hidden;background:#f0f0f2;">
                <img :src="'/thumbnails/' + img.md5_hash + '_256.jpg'"
                     :alt="img.filename"
                     loading="lazy"
                     style="width:100%;height:100%;object-fit:cover"
                     @error="$el.style.display='none'">
              </div>
              <div class="p-3">
                <div class="text-[11px] text-gray-500 mb-1" x-text="img.filename"></div>
                <div class="flex items-center gap-2">
                  <button @click.stop="restoreOne(img.id)" class="flex-1 h-7 rounded-xl text-[11px] font-medium flex items-center justify-center gap-1"
                          style="background:rgba(52,199,89,0.1);color:#1a6a32;border:none;cursor:pointer;transition:all 0.2s"
                          @mouseenter="$el.style.background='rgba(52,199,89,0.25)'"
                          @mouseleave="$el.style.background='rgba(52,199,89,0.1)'">
                    <i class="fa-regular fa-rotate-left" style="font-size:9px"></i>恢复
                  </button>
                  <button @click.stop="deleteOne(img.id)" class="flex-1 h-7 rounded-xl text-[11px] font-medium flex items-center justify-center gap-1"
                          style="background:rgba(255,59,48,0.08);color:#b82e24;border:none;cursor:pointer;transition:all 0.2s"
                          @mouseenter="$el.style.background='rgba(255,59,48,0.2)'"
                          @mouseleave="$el.style.background='rgba(255,59,48,0.08)'">
                    <i class="fa-regular fa-xmark" style="font-size:9px"></i>永久删除
                  </button>
                </div>
              </div>
              <!-- Checkbox overlay -->
              <div class="absolute top-2 left-2 w-5 h-5 rounded-md flex items-center justify-center transition-all duration-150"
                   :class="selected.includes(img.id) ? 'bg-blue-500 text-white' : 'bg-white/80 text-transparent'"
                   style="border:1.5px solid rgba(0,0,0,0.12);font-size:11px">
                <i class="fa-solid fa-check" x-show="selected.includes(img.id)"></i>
              </div>
            </div>
          </template>
        </div>
      </div>
    </template>
  </div>
</div>

<script>
function recycleApp() {
  return {
    images: {{ images | tojson }},
    selected: [],

    init() {
      // Add data-img-id for marquee
      this.$nextTick(() => {
        const cards = document.querySelectorAll('[data-img-id]');
        cards.forEach((el, i) => {
          if (this.images[i]) el.dataset.imgId = this.images[i].id;
        });
      });
      window.__marqueeAdd = (id) => {
        if (!this.selected.includes(id)) this.selected.push(id);
      };
    },

    toggleSelect(id) {
      const idx = this.selected.indexOf(id);
      if (idx >= 0) this.selected.splice(idx, 1);
      else this.selected.push(id);
    },

    async restoreOne(id) {
      await fetch('/recycle/' + id + '/restore', { method: 'POST' });
      location.reload();
    },
    async deleteOne(id) {
      if (!confirm('确定要永久删除这张图片吗？此操作不可撤销。')) return;
      await fetch('/recycle/' + id + '/delete-permanent', { method: 'POST' });
      location.reload();
    },
    async batchRestore() {
      for (const id of this.selected) {
        await fetch('/recycle/' + id + '/restore', { method: 'POST' });
      }
      this.selected = [];
      location.reload();
    },
    async batchDelete() {
      if (!confirm('确定要永久删除选中的 ' + this.selected.length + ' 张图片吗？')) return;
      for (const id of this.selected) {
        await fetch('/recycle/' + id + '/delete-permanent', { method: 'POST' });
      }
      this.selected = [];
      location.reload();
    },
    async emptyAll() {
      if (!confirm('确定要清空回收站吗？所有图片将被永久删除。')) return;
      await fetch('/recycle/empty', { method: 'POST' });
      location.reload();
    },
  };
}
</script>
{% endblock %}
