{% extends "base.html" %}
{% block title %}分类管理{% endblock %}
{% block extra_head %}
<style>
[x-cloak] { display: none !important; }
.cat-tree { list-style: none; padding: 0; margin: 0; }
.cat-tree li { position: relative; }
.cat-node {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 10px; margin: 1px 0;
  border-radius: 8px; cursor: pointer;
  transition: all 0.15s; font-size: 13px; user-select: none;
}
.cat-node:hover { background: rgba(0,122,255,0.06); }
.cat-node .count-badge {
  margin-left: auto; font-size: 10px; font-weight: 500;
  padding: 0 7px; border-radius: 999px;
  background: rgba(0,0,0,0.04); color: #999;
}
.cat-node .color-swatch {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  border: 2px solid rgba(255,255,255,0.8); box-shadow: 0 1px 2px rgba(0,0,0,0.1);
}
.cat-tree-children { padding-left: 20px; }
.node-arrow { font-size:8px;width:14px;text-align:center;color:#bbb;flex-shrink:0;transition:transform 0.2s;display:inline-block; }
.glass-btn { cursor: pointer; border: none; outline: none; transition: all 0.2s; backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.25); }
.glass-btn:hover { transform: scale(1.04); }
</style>
{% endblock %}

{% block content %}
<div x-data="catApp()" x-init="init()" class="min-h-screen" style="background:#f5f5f7;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <!-- Header -->
  <div class="sticky top-0 z-30 bg-white/80 backdrop-blur-2xl border-b border-white/30 px-6 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-full bg-blue-50 flex items-center justify-center text-blue-500 shadow-sm">
        <i class="fa-solid fa-sitemap" style="font-size:13px"></i>
      </div>
      <h1 class="text-base font-semibold text-gray-800">分类管理</h1>
      <span class="text-[11px] text-gray-400" x-text="totalCount + ' 张图片 · ' + flatNodes.length + ' 个分类'"></span>
    </div>
    <button @click="openCreate()" class="h-8 px-4 rounded-full text-xs font-medium flex items-center gap-1.5 glass-btn" style="background:rgba(0,122,255,0.15);color:#007aff;">
      <i class="fa-solid fa-plus"></i>新建分类
    </button>
  </div>

  <div class="flex" style="height:calc(100vh - 96px)">
    <!-- Left sidebar: category tree -->
    <div class="w-72 flex-shrink-0 border-r border-white/30 bg-white/30 p-4 overflow-y-auto">
      <div class="text-[11px] font-semibold text-gray-400 uppercase tracking-wider mb-3">分类树</div>
      <div x-show="!loading" id="tree-root"></div>
      <div x-show="!loading && !tree.length" class="text-center py-12 text-gray-400 text-xs">暂无分类<br><span class="text-[10px] text-gray-300">AI 识别后自动创建，或手动新建</span></div>
      <div x-show="loading" class="flex justify-center py-12"><i class="fa-solid fa-spinner fa-spin text-blue-400"></i></div>
    </div>

    <!-- Right content -->
    <div class="flex-1 overflow-y-auto p-6">
      <!-- Empty state -->
      <div x-show="!selectedCat" class="flex flex-col items-center justify-center h-full text-gray-400">
        <i class="fa-regular fa-folder-open text-5xl mb-4 opacity-20"></i>
        <p class="text-sm font-medium text-gray-500">选择一个分类</p>
        <p class="text-[11px] mt-1 text-gray-300">左侧点击查看详情和管理</p>
      </div>

      <!-- Category detail -->
      <div x-show="selectedCat">
        <!-- Breadcrumb -->
        <div class="flex items-center gap-2 text-xs text-gray-400 mb-4 flex-wrap">
          <a href="/categories" class="text-blue-500 hover:underline">全部分类</a>
          <template x-for="(crumb, i) in breadcrumb" :key="crumb.id">
            <span><span class="mx-0.5">›</span><a href="#" @click.prevent="selectCat(crumb.id)" class="text-blue-500 hover:underline" x-text="crumb.name"></a></span>
          </template>
          <span class="mx-0.5">›</span>
          <span class="text-gray-700 font-medium" x-text="selectedCat.name"></span>
        </div>

        <!-- Header card -->
        <div class="p-5 rounded-2xl mb-5" style="background:rgba(255,255,255,0.8);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.4);box-shadow:0 2px 24px rgba(0,0,0,0.04);">
          <div class="flex items-start justify-between">
            <div class="flex items-center gap-4">
              <div class="w-14 h-14 rounded-2xl flex items-center justify-center shadow-sm text-xl"
                   :style="'background:' + selectedCat.color + '18; color:' + selectedCat.color">
                <i class="fa-solid fa-folder"></i>
              </div>
              <div>
                <h2 class="text-xl font-bold text-gray-900" x-text="selectedCat.name"></h2>
                <div class="flex items-center gap-3 mt-1">
                  <span class="text-xs text-gray-400">
                    <b class="text-gray-600" x-text="counts[selectedCat.id]?.total || 0"></b> 张图片
                  </span>
                  <span class="text-xs text-gray-400">
                    待确认 <b class="text-blue-500" x-text="counts[selectedCat.id]?.pending || 0"></b>
                  </span>
                  <span class="text-xs text-gray-400">
                    已归档 <b class="text-green-500" x-text="counts[selectedCat.id]?.confirmed || 0"></b>
                  </span>
                  <template x-if="selectedCat.parent_id">
                    <span class="text-xs text-gray-400">父: <span class="text-blue-500" x-text="getParentName(selectedCat.parent_id)"></span></span>
                  </template>
                </div>
              </div>
            </div>
            <div class="flex items-center gap-1.5">
              <a :href="'/archive?category=' + encodeURIComponent(selectedCat.name)"
                 class="h-8 px-4 rounded-xl text-xs font-medium flex items-center gap-1.5 glass-btn"
                 style="background:rgba(0,122,255,0.12);color:#007aff;">
                <i class="fa-solid fa-arrow-up-right-from-square" style="font-size:10px"></i>查看图片
              </a>
            </div>
          </div>

          <!-- Actions -->
          <div class="flex items-center gap-2 mt-4 pt-4 border-t border-gray-100/60">
            <button @click="startRename" class="h-8 px-4 rounded-xl text-xs font-medium glass-btn" style="background:rgba(0,0,0,0.04);color:#555;">
              <i class="fa-solid fa-pen mr-1"></i>重命名
            </button>
            <button @click="startMove" class="h-8 px-4 rounded-xl text-xs font-medium glass-btn" style="background:rgba(0,0,0,0.04);color:#555;">
              <i class="fa-solid fa-arrow-right mr-1"></i>移动
            </button>
            <button @click="confirmDelete" class="h-8 px-4 rounded-xl text-xs font-medium glass-btn" style="background:rgba(255,69,58,0.12);color:#9b1c1c;">
              <i class="fa-regular fa-trash-can mr-1"></i>删除
            </button>
          </div>

          <!-- Rename form -->
          <div x-show="renaming" class="mt-3 flex items-center gap-2" x-cloak>
            <input type="text" x-model="renameText" @keydown.enter="submitRename" x-ref="renameInput"
                   class="flex-1 h-9 px-3 text-sm bg-white border border-blue-300/60 rounded-xl outline-none focus:border-blue-400">
            <button @click="submitRename" class="h-9 px-5 rounded-xl text-xs font-medium glass-btn" style="background:rgba(0,122,255,0.15);color:#007aff;">保存</button>
            <button @click="renaming=false" class="h-9 px-4 rounded-xl text-xs font-medium glass-btn" style="background:rgba(0,0,0,0.04);color:#555;">取消</button>
          </div>

          <!-- Move form -->
          <div x-show="moving" class="mt-3 flex items-center gap-2" x-cloak>
            <select x-model="moveTarget" class="h-9 px-3 text-sm bg-white border border-gray-200/80 rounded-xl outline-none">
              <option value="">根目录</option>
              <template x-for="n in flatNodes" :key="n.id">
                <template x-if="n.id !== selectedCat.id && !isDescendant(n.id, tree)">
                  <option :value="n.id" x-text="n.name" :style="'padding-left:' + (n.depth * 12 + 8) + 'px'"></option>
                </template>
              </template>
            </select>
            <button @click="submitMove" class="h-9 px-5 rounded-xl text-xs font-medium glass-btn" style="background:rgba(0,122,255,0.15);color:#007aff;">移动</button>
            <button @click="moving=false" class="h-9 px-4 rounded-xl text-xs font-medium glass-btn" style="background:rgba(0,0,0,0.04);color:#555;">取消</button>
          </div>
        </div>

        <!-- Subcategories -->
        <div x-show="selectedCatChildren.length" class="p-5 rounded-2xl mb-5" style="background:rgba(255,255,255,0.8);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.4);">
          <div class="text-[11px] font-semibold text-gray-400 uppercase tracking-wider mb-3">子分类</div>
          <div class="flex flex-wrap gap-2">
            <template x-for="child in selectedCatChildren" :key="child.id">
              <a :href="'/archive?category=' + encodeURIComponent(child.name)"
                 class="flex items-center gap-2 px-3 py-2 rounded-xl transition-all border border-transparent hover:border-blue-100 hover:bg-blue-50/50 text-xs font-medium text-gray-700">
                <div class="w-6 h-6 rounded-lg flex items-center justify-center text-[10px]"
                     :style="'background:' + (child.color||'#007aff') + '18; color:' + (child.color||'#007aff')">
                  <i class="fa-solid fa-folder"></i>
                </div>
                <span x-text="child.name"></span>
                <span class="text-[10px] text-gray-400" x-text="'(' + (counts[child.id]?.total||0) + ')'"></span>
              </a>
            </template>
          </div>
        </div>
      </div>

      <!-- Create form -->
      <div x-show="creating" class="max-w-md mx-auto mt-8 p-6 rounded-2xl" style="background:rgba(255,255,255,0.8);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.4);">
        <h3 class="text-sm font-semibold text-gray-800 mb-4 flex items-center gap-2">
          <i class="fa-regular fa-plus text-blue-500"></i> 新建分类
        </h3>
        <div class="space-y-3">
          <div>
            <label class="text-[11px] font-medium text-gray-500 mb-1 block">名称</label>
            <input type="text" x-model="formName" @keydown.enter="submitCreate"
                   placeholder="分类名称…" x-ref="createInput"
                   class="w-full h-10 px-3 text-sm bg-white border border-gray-200/80 rounded-xl focus:border-blue-400 outline-none transition-all">
          </div>
          <div class="flex gap-3">
            <div class="flex-1">
              <label class="text-[11px] font-medium text-gray-500 mb-1 block">父分类</label>
              <select x-model="formParentId" class="w-full h-10 px-3 text-sm bg-white border border-gray-200/80 rounded-xl outline-none">
                <option value="">根目录</option>
                <template x-for="n in flatNodes" :key="n.id">
                  <option :value="n.id" x-text="n.name"></option>
                </template>
              </select>
            </div>
            <div class="w-24">
              <label class="text-[11px] font-medium text-gray-500 mb-1 block">颜色</label>
              <input type="color" x-model="formColor" class="w-full h-10 rounded-xl border border-gray-200/80 cursor-pointer bg-white">
            </div>
          </div>
          <div class="flex items-center gap-2 pt-1">
            <button @click="submitCreate" class="h-9 px-5 rounded-xl text-xs font-medium glass-btn" :disabled="!formName.trim()"
                    style="background:rgba(0,122,255,0.15);color:#007aff;">
              <i class="fa-solid fa-check mr-1"></i>创建
            </button>
            <button @click="creating=false;formName=''" class="h-9 px-4 rounded-xl text-xs font-medium glass-btn" style="background:rgba(0,0,0,0.04);color:#555;">取消</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
function catApp() {
  return {
    tree: [], flatNodes: [], counts: {},
    selectedCat: null, breadcrumb: [], selectedCatChildren: [],
    loading: true, renaming: false, renameText: '',
    moving: false, moveTarget: '',
    creating: false, formName: '', formColor: '#007AFF', formParentId: '',

    get totalCount() {
      return Object.values(this.counts).reduce((s, c) => s + (c.total || 0), 0);
    },

    async init() {
      await this.loadData();
    },

    getParentName(id) {
      const n = this.flatNodes.find(f => f.id === id);
      return n ? n.name : '—';
    },

    isDescendant(id, nodes) {
      for (const n of nodes) {
        if (n.id === id) return true;
        if (n.children && this.isDescendant(id, n.children)) return true;
      }
      return false;
    },

    buildBreadcrumb(id, nodes, path = []) {
      for (const n of nodes) {
        if (n.id === id) {
          path.push({id: n.id, name: n.name});
          return true;
        }
        if (n.children) {
          if (this.buildBreadcrumb(id, n.children, path)) {
            path.unshift({id: n.id, name: n.name});
            return true;
          }
        }
      }
      return false;
    },

    flatten(nodes, depth = 0) {
      for (const n of nodes) {
        this.flatNodes.push({id: n.id, name: n.name, depth, color: n.color, parent_id: n.parent_id});
        if (n.children) this.flatten(n.children, depth + 1);
      }
    },

    async loadData() {
      this.loading = true;
      this.flatNodes = [];
      try {
        const r = await fetch('/categories/data');
        const data = await r.json();
        this.tree = data.tree;
        this.counts = data.counts;
        this.flatten(data.tree);
        this.$nextTick(() => {
          const root = document.getElementById('tree-root');
          if (root) root.innerHTML = this.renderTree(this.tree);
        });
      } catch(e) { console.error(e); }
      this.loading = false;
    },

    renderTree(nodes) {
      if (!nodes || !nodes.length) return '';
      let html = '<ul class="cat-tree">';
      for (const n of nodes) {
        const hasChildren = n.children && n.children.length > 0;
        const active = this.selectedCat && this.selectedCat.id === n.id;
        html += '<li>';
        html += '<div class="cat-node' + (active ? ' style="background:rgba(0,122,255,0.12);color:#007aff;font-weight:600;' : '') + '" @click="selectCat(' + n.id + ')">';
        if (hasChildren) {
          html += '<span class="node-arrow" @click.stop="toggleExpand(' + n.id + ')">▶</span>';
        } else {
          html += '<span style="width:14px;flex-shrink:0"></span>';
        }
        html += '<span class="color-swatch" style="background:' + (n.color || '#007aff') + '"></span>';
        html += '<span>' + n.name + '</span>';
        html += '<span class="count-badge">' + (this.counts[n.id]?.total || 0) + '</span>';
        html += '</div>';
        if (hasChildren) {
          html += '<div class="cat-tree-children">' + this.renderTree(n.children) + '</div>';
        }
        html += '</li>';
      }
      html += '</ul>';
      return html;
    },

    toggleExpand(id) {
      const el = document.querySelector('#tree-root .cat-node:has(+ .cat-tree-children) .node-arrow');
      // Simple approach: re-render with we control expansion state
      this.$nextTick(() => {
        const root = document.getElementById('tree-root');
        if (root) root.innerHTML = this.renderTree(this.tree);
      });
    },

    async selectCat(id) {
      this.renaming = false; this.moving = false; this.creating = false;
      await this.loadData();
      const find = (nodes) => {
        for (const n of nodes) {
          if (n.id === id) {
            this.selectedCat = n;
            this.selectedCatChildren = n.children || [];
            this.breadcrumb = [];
            this.buildBreadcrumb(id, this.tree, this.breadcrumb);
            return true;
          }
          if (n.children && find(n.children)) return true;
        }
        return false;
      };
      find(this.tree);
    },

    openCreate() {
      this.selectedCat = null; this.creating = true;
      this.formName = ''; this.formColor = '#007AFF'; this.formParentId = '';
      this.$nextTick(() => { if (this.$refs.createInput) this.$refs.createInput.focus(); });
    },

    async submitCreate() {
      if (!this.formName.trim()) return;
      const fd = new FormData();
      fd.append('name', this.formName.trim());
      fd.append('parent_id', this.formParentId);
      fd.append('color', this.formColor);
      await fetch('/categories/create', { method: 'POST', body: fd });
      this.creating = false;
      await this.loadData();
    },

    startRename() {
      this.renameText = this.selectedCat ? this.selectedCat.name : '';
      this.renaming = true; this.moving = false;
      this.$nextTick(() => { if (this.$refs.renameInput) this.$refs.renameInput.focus(); });
    },

    async submitRename() {
      if (!this.renameText.trim() || !this.selectedCat) return;
      const fd = new FormData();
      fd.append('id', this.selectedCat.id);
      fd.append('name', this.renameText.trim());
      await fetch('/categories/rename', { method: 'POST', body: fd });
      this.renaming = false;
      await this.selectCat(this.selectedCat.id);
    },

    startMove() {
      this.moving = true; this.renaming = false; this.moveTarget = '';
    },

    async submitMove() {
      if (!this.selectedCat) return;
      const fd = new FormData();
      fd.append('id', this.selectedCat.id);
      fd.append('parent_id', this.moveTarget);
      await fetch('/categories/move', { method: 'POST', body: fd });
      this.moving = false;
      await this.selectCat(this.selectedCat.id);
    },

    confirmDelete() {
      if (!this.selectedCat) return;
      const name = this.selectedCat.name;
      const count = this.counts[this.selectedCat.id]?.total || 0;
      if (!confirm(`确定删除分类「${name}」？该分类下有 ${count} 张图片的连接将被移除。`)) return;
      const fd = new FormData();
      fd.append('id', this.selectedCat.id);
      fetch('/categories/delete', { method: 'POST', body: fd }).then(() => {
        this.selectedCat = null;
        this.loadData();
      });
    },
  };
}
</script>
{% endblock %}
