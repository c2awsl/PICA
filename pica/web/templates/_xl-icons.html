<div class="ani-in glass-card rounded-2xl overflow-hidden group relative">
  <a href="/preview/{{ img.id }}" target="_blank" class="block">
    <img src="/thumbnails/{{ img.md5_hash }}_256.jpg" alt="{{ img.filename }}" loading="lazy" class="w-full aspect-square object-cover block bg-gray-100/50">
  </a>
  <div x-show="selectionMode" class="absolute top-3 left-3 z-10">
    <input type="checkbox" :checked="selected.includes({{ img.id }})" @change="toggleSelect({{ img.id }})" class="w-4 h-4 rounded border-white/60 text-blue-500 focus:ring-blue-400 cursor-pointer shadow-lg">
  </div>
  <div class="absolute top-2 right-2 flex gap-1.5 opacity-0 group-hover:opacity-100 transition-all duration-300 z-10 translate-y-1 group-hover:translate-y-0">
    {% if img.ai_status == 'failed' %}
    <form action="/pending/{{ img.id }}/retry-ai" method="post" class="inline">
      <button class="glass-btn glass-gray w-9 h-9 rounded-full flex items-center justify-center text-sm shadow-lg" title="重试AI识别"><i class="fa-solid fa-rotate"></i></button>
    </form>
    {% endif %}
    <form action="/pending/{{ img.id }}/confirm" method="post" class="inline">
      <button class="glass-btn glass-green w-9 h-9 rounded-full flex items-center justify-center text-sm shadow-lg">✓</button>
    </form>
    <form action="/pending/{{ img.id }}/reject" method="post" class="inline">
      <button class="glass-btn glass-red w-9 h-9 rounded-full flex items-center justify-center text-sm shadow-lg">✕</button>
    </form>
  </div>
  <div class="px-2.5 py-2 flex items-center justify-between gap-1.5 border-t border-white/20">
    <span class="text-[11px] text-gray-500 truncate font-medium leading-tight">{{ img.filename }}</span>
    {% if img.ai_status == 'pending' %}
    <span class="flex-shrink-0 text-[10px] px-2 py-0.5 rounded-full bg-gray-100/80 text-gray-500 border border-gray-200/40 font-medium flex items-center gap-1"><i class="fa-regular fa-clock"></i></span>
    {% elif img.ai_status == 'processing' %}
    <span class="flex-shrink-0 text-[10px] px-2 py-0.5 rounded-full bg-blue-50/80 text-blue-600 border border-blue-200/40 font-medium flex items-center gap-1"><i class="fa-solid fa-spinner fa-spin"></i></span>
    {% elif img.ai_status == 'done' %}
    <span class="flex-shrink-0 text-[10px] px-2 py-0.5 rounded-full bg-green-50/80 text-green-600 border border-green-200/40 font-medium flex items-center gap-1"><i class="fa-regular fa-circle-check"></i></span>
    {% elif img.ai_status == 'failed' %}
    <span class="flex-shrink-0 text-[10px] px-2 py-0.5 rounded-full bg-red-50/80 text-red-600 border border-red-200/40 font-medium flex items-center gap-1"><i class="fa-regular fa-circle-exclamation"></i></span>
    {% endif %}
  </div>
</div>
