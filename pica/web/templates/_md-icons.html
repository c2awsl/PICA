<div class="ani-in glass-card rounded-xl overflow-hidden group relative cursor-pointer transition-all duration-150"
     data-img-id="{{ img.id }}"
     @click="toggleSelect({{ img.id }})"
     :class="selected.includes({{ img.id }}) ? 'ring-2 ring-blue-500 ring-offset-1' : ''">
  <div class="absolute top-1.5 left-1.5 z-10" @click.stop>
    <input type="checkbox" :checked="selected.includes({{ img.id }})" @change="toggleSelect({{ img.id }})" class="w-3 h-3 rounded border-white/60 text-blue-500 cursor-pointer shadow">
  </div>
  <div class="relative" draggable="true"
       @dragstart="onDragStart($event, {id:{{ img.id }},thumb:'/thumbnails/{{ img.md5_hash }}_256.jpg',lightbox:'/thumbnails/{{ img.md5_hash }}_1024.jpg'})">
    <img src="/thumbnails/{{ img.md5_hash }}_256.jpg" alt="{{ img.filename }}" loading="lazy" class="w-full aspect-square object-cover block bg-gray-100/50">
  </div>
  <div class="px-1.5 py-1 flex items-center justify-between gap-0.5 border-t border-white/20">
    <span class="text-[9px] text-gray-400 truncate flex-1 min-w-0">{{ img.filename }}</span>
    <div class="flex items-center gap-0.5 flex-shrink-0" @click.stop>
      <form action="/pending/{{ img.id }}/confirm" method="post" style="display:inline">
        <input type="hidden" name="category" value="{{ (img.suggested_category_list or [''])[0] }}">
        <button type="submit" class="glass-btn glass-green w-5 h-5 rounded-full flex items-center justify-center text-[7px]" title="归档"><i class="fa-solid fa-check"></i></button>
      </form>
      <form action="/pending/{{ img.id }}/reject" method="post"><button type="submit" class="glass-btn glass-red w-5 h-5 rounded-full flex items-center justify-center text-[7px]" title="驳回"><i class="fa-solid fa-xmark"></i></button></form>
    </div>
  </div>
</div>
