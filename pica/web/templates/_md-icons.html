<div class="ani-in glass-card rounded-xl overflow-hidden group relative">
  <a href="/preview/{{ img.id }}" target="_blank" class="block">
    <img src="/thumbnails/{{ img.md5_hash }}_256.jpg" alt="{{ img.filename }}" loading="lazy" class="w-full aspect-square object-cover block bg-gray-100/50">
  </a>
  <div x-show="selectionMode" class="absolute top-1.5 left-1.5 z-10">
    <input type="checkbox" :checked="selected.includes({{ img.id }})" @change="toggleSelect({{ img.id }})" class="w-3 h-3 rounded border-white/60 text-blue-500 cursor-pointer shadow">
  </div>
  <div class="absolute top-1 right-1 flex gap-0.5 opacity-0 group-hover:opacity-100 transition-all duration-300 z-10">
    <form action="/pending/{{ img.id }}/confirm" method="post"><button class="glass-btn glass-green w-6 h-6 rounded-full flex items-center justify-center text-[9px] shadow">✓</button></form>
    <form action="/pending/{{ img.id }}/reject" method="post"><button class="glass-btn glass-red w-6 h-6 rounded-full flex items-center justify-center text-[9px] shadow">✕</button></form>
  </div>
</div>
