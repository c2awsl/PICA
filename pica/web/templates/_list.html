<div class="ani-in flex items-center gap-3 px-3 py-2 border-b border-white/30 hover:bg-white/40 transition-all duration-300 group">
  <input type="checkbox" x-show="selectionMode" :checked="selected.includes({{ img.id }})" @change="toggleSelect({{ img.id }})" class="w-3.5 h-3.5 rounded border-gray-300 text-blue-500 cursor-pointer flex-shrink-0">
  <a href="/preview/{{ img.id }}" target="_blank" class="flex-shrink-0">
    <img src="/thumbnails/{{ img.md5_hash }}_256.jpg" alt="" loading="lazy" class="w-8 h-8 object-cover rounded-lg bg-gray-100/50 shadow-sm">
  </a>
  <div class="flex-1 min-w-0 flex items-center gap-3">
    <div class="flex-1 min-w-0 text-sm font-medium text-gray-700 truncate">{{ img.filename }}</div>
    {% if img.work_name or img.image_type %}
    <div class="hidden sm:flex items-center gap-1.5 flex-shrink-0">
      {% if img.work_name %}<span class="text-[10px] px-2 py-0.5 rounded-full bg-blue-50/80 text-blue-600 border border-blue-200/40 truncate max-w-[90px] font-medium">{{ img.work_name }}</span>{% endif %}
      {% if img.image_type %}<span class="text-[10px] px-2 py-0.5 rounded-full bg-purple-50/80 text-purple-600 border border-purple-200/40 font-medium">{{ img.image_type }}</span>{% endif %}
    </div>
    {% endif %}
    <div class="text-[11px] text-gray-400 flex-shrink-0 hidden md:block font-medium">{{ (img.file_size/1024)|round(1) }} KB</div>
  </div>
  <div class="flex gap-1.5 flex-shrink-0 opacity-0 group-hover:opacity-100 transition-all duration-300">
    <form action="/pending/{{ img.id }}/confirm" method="post"><button class="glass-btn glass-green w-7 h-7 rounded-lg flex items-center justify-center text-[10px]">✓</button></form>
    <form action="/pending/{{ img.id }}/reject" method="post"><button class="glass-btn glass-red w-7 h-7 rounded-lg flex items-center justify-center text-[10px]">✕</button></form>
  </div>
</div>
