<div class="ani-in flex items-center gap-3 py-2 px-3 border-b border-white/20 hover:bg-white/40 transition-all duration-200 group cursor-pointer"
     data-img-id="{{ img.id }}"
     @click="toggleSelect({{ img.id }})"
     :class="selected.includes({{ img.id }}) ? 'bg-blue-50/60' : ''">
  <div @click.stop>
    <input type="checkbox" :checked="selected.includes({{ img.id }})" @change="toggleSelect({{ img.id }})" class="w-3.5 h-3.5 rounded border-gray-300 text-blue-500 cursor-pointer flex-shrink-0">
  </div>
  <div class="w-10 h-10 rounded-lg overflow-hidden flex-shrink-0 bg-gray-100/50">
    <img src="/thumbnails/{{ img.md5_hash }}_256.jpg" alt="" loading="lazy" class="w-full h-full object-cover">
  </div>
  <div class="flex-1 min-w-0 text-sm text-gray-700 truncate">{{ img.filename }}</div>
  <div class="text-xs text-gray-400 flex-shrink-0 hidden sm:block">{{ img.work_name or '' }}</div>
  <div class="flex items-center gap-1 flex-shrink-0" @click.stop>
    <form action="/pending/{{ img.id }}/confirm" method="post" style="display:inline">
      <input type="hidden" name="category" value="{{ (img.suggested_category_list or [''])[0] }}">
      <input type="hidden" name="tags" value="{{ (img.suggested_tags_list or []) | join(',') }}">
      <button type="submit" class="glass-btn glass-green w-6 h-6 rounded-full flex items-center justify-center text-[9px]" title="归档"><i class="fa-solid fa-check"></i></button>
    </form>
    <form action="/pending/{{ img.id }}/reject" method="post"><button type="submit" class="glass-btn glass-red w-6 h-6 rounded-full flex items-center justify-center text-[9px]" title="驳回"><i class="fa-solid fa-xmark"></i></button></form>
  </div>
</div>
