<div class="ani-in break-inside-avoid mb-4 glass-card rounded-2xl overflow-hidden group relative cursor-pointer transition-all duration-150"
     data-img-id="{{ img.id }}"
     @click="toggleSelect({{ img.id }})"
     :class="selected.includes({{ img.id }}) ? 'ring-2 ring-blue-500 ring-offset-1' : ''">
  <div class="absolute top-2 left-2 z-10" @click.stop>
    <input type="checkbox" :checked="selected.includes({{ img.id }})" @change="toggleSelect({{ img.id }})" class="w-3.5 h-3.5 rounded border-white/60 text-blue-500 cursor-pointer shadow">
  </div>
  <div class="relative" draggable="true"
       @dragstart="onDragStart($event, {id:{{ img.id }},thumb:'/thumbnails/{{ img.md5_hash }}_256.jpg',lightbox:'/thumbnails/{{ img.md5_hash }}_1024.jpg'})">
    <img src="/thumbnails/{{ img.md5_hash }}_256.jpg" alt="{{ img.filename }}" loading="lazy" class="w-full h-auto object-cover block bg-gray-100/50">
  </div>
  <div class="flex items-center justify-between px-2 py-1.5 border-t border-white/20 gap-1">
    <div class="flex items-center gap-1 min-w-0 flex-1">
      {% if img.ai_status == 'failed' %}
      <span class="flex-shrink-0 w-1.5 h-1.5 rounded-full bg-red-500" title="识别失败"></span>
      {% elif img.ai_status == 'processing' %}
      <span class="flex-shrink-0 w-1.5 h-1.5 rounded-full bg-blue-500 animate-pulse" title="识别中"></span>
      {% elif img.ai_status == 'pending' %}
      <span class="flex-shrink-0 w-1.5 h-1.5 rounded-full bg-gray-400" title="等待识别"></span>
      {% endif %}
    </div>
    <div class="flex items-center gap-1 flex-shrink-0" @click.stop>
      {% if img.ai_status == 'failed' %}
      <form action="/pending/{{ img.id }}/retry-ai" method="post"><button type="submit" class="glass-btn glass-gray w-6 h-6 rounded-full flex items-center justify-center text-[9px]" title="重试AI"><i class="fa-solid fa-rotate"></i></button></form>
      {% endif %}
      <form action="/pending/{{ img.id }}/confirm" method="post" style="display:inline">
        <input type="hidden" name="category" value="{{ (img.suggested_category_list or [''])[0] }}">
        <input type="hidden" name="tags" value="{{ (img.suggested_tags_list or []) | join(',') }}">
        <button type="submit" class="glass-btn glass-green w-6 h-6 rounded-full flex items-center justify-center text-[9px]" title="归档"><i class="fa-solid fa-check"></i></button>
      </form>
      <form action="/pending/{{ img.id }}/reject" method="post"><button type="submit" class="glass-btn glass-red w-6 h-6 rounded-full flex items-center justify-center text-[9px]" title="驳回"><i class="fa-solid fa-xmark"></i></button></form>
    </div>
  </div>
</div>
