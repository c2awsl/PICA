<div class="ani-in glass-card rounded-2xl overflow-hidden group relative">
  <a href="/preview/{{ img.id }}" target="_blank" class="block">
    <img src="/thumbnails/{{ img.md5_hash }}_256.jpg" alt="{{ img.filename }}" loading="lazy" class="w-full aspect-square object-cover block bg-gray-100/50">
  </a>
  <div x-show="selectionMode" class="absolute top-2 left-2 z-10">
    <input type="checkbox" :checked="selected.includes({{ img.id }})" @change="toggleSelect({{ img.id }})" class="w-3.5 h-3.5 rounded border-white/60 text-blue-500 cursor-pointer shadow">
  </div>
  <div class="absolute top-1.5 right-1.5 flex gap-1 opacity-0 group-hover:opacity-100 transition-all duration-300 z-10 translate-y-1 group-hover:translate-y-0">
    {% if img.ai_status == 'failed' %}
    <form action="/pending/{{ img.id }}/retry-ai" method="post"><button class="glass-btn glass-gray w-7 h-7 rounded-full flex items-center justify-center text-[10px] shadow" title="重试AI识别"><i class="fa-solid fa-rotate"></i></button></form>
    {% endif %}
    <form action="/pending/{{ img.id }}/confirm" method="post"><button class="glass-btn glass-green w-7 h-7 rounded-full flex items-center justify-center text-[10px] shadow">✓</button></form>
    <form action="/pending/{{ img.id }}/reject" method="post"><button class="glass-btn glass-red w-7 h-7 rounded-full flex items-center justify-center text-[10px] shadow">✕</button></form>
  </div>
  <div class="px-2 py-1.5 flex items-center justify-between gap-1 border-t border-white/20">
    <span class="text-[10px] text-gray-400 truncate text-center">{{ img.filename }}</span>
    {% if img.ai_status == 'pending' %}
    <span class="flex-shrink-0 w-1.5 h-1.5 rounded-full bg-gray-400" title="等待识别"></span>
    {% elif img.ai_status == 'processing' %}
    <span class="flex-shrink-0 w-1.5 h-1.5 rounded-full bg-blue-500 animate-pulse" title="识别中"></span>
    {% elif img.ai_status == 'done' %}
    <span class="flex-shrink-0 w-1.5 h-1.5 rounded-full bg-green-500" title="已识别"></span>
    {% elif img.ai_status == 'failed' %}
    <span class="flex-shrink-0 w-1.5 h-1.5 rounded-full bg-red-500" title="识别失败"></span>
    {% endif %}
  </div>
</div>
